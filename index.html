<style>
/* ══ TOKENS ══ */
:root{
  --ink:#1a1410;--ink2:#2d2218;
  --cream:#f5f0e8;--cream2:#ede7db;--cream3:#e4ddd0;
  --gold:#b8842a;--gold2:#d4a040;--gold-light:#f0d080;
  --gd:#1a3c1e;--gm:#2a5c30;
  --white:#fdfcfa;--muted:#6a5c4a;
  --b:rgba(90,70,40,0.15);--b2:rgba(90,70,40,0.28);
  --sh:0 4px 28px rgba(26,20,16,0.11);
  --WA:#25D366;
  --r:8px;--rl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);line-height:1.65;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Playfair Display',serif}
h1{font-size:clamp(1.9rem,4.5vw,3.3rem);font-weight:700;line-height:1.1}
h2{font-size:clamp(1.4rem,3vw,2.2rem);font-weight:600;line-height:1.2}
img{max-width:100%}

/* ══ NAV ══ */
.site-nav{background:var(--ink2);padding:0 max(16px,4vw);display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:300;border-bottom:1px solid rgba(255,255,255,0.06)}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold-light);text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-logo-icon{width:26px;height:26px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-logo span{color:rgba(255,255,255,0.38);font-weight:300}
.site-tabs{display:flex;gap:4px;background:rgba(255,255,255,0.05);border-radius:7px;padding:4px}
.site-tab{padding:5px 14px;border-radius:5px;font-size:0.78rem;font-weight:500;color:rgba(255,255,255,0.55);text-decoration:none;transition:all .18s;white-space:nowrap}
.site-tab.active{background:var(--gold);color:var(--ink);font-weight:700}
.nav-links{display:flex;gap:18px;list-style:none;align-items:center}
.nav-links a{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.77rem;font-weight:500;transition:color .2s}
.nav-links a:hover{color:var(--gold-light)}
.nav-cta{background:var(--WA);color:#fff!important;padding:5px 13px;border-radius:6px;font-weight:700!important;display:flex;align-items:center;gap:5px}
@media(max-width:680px){.nav-links{display:none}.site-tabs{gap:2px}.site-tab{padding:5px 10px;font-size:0.72rem}}

/* ══ HERO COMPACTO ══ */
.hero{background:var(--gd);padding:clamp(44px,7vh,80px) max(16px,5vw) clamp(32px,4vh,56px);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 60% 50%,rgba(180,130,40,0.09) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
.hero-inner{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:32px;align-items:center;position:relative;z-index:2}
.hero-text{}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(180,130,40,0.15);border:1px solid rgba(180,130,40,0.3);color:var(--gold-light);font-size:0.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:18px}
.hero h1{color:#fff;margin-bottom:14px}
.hero h1 em{font-style:italic;color:var(--gold-light)}
.hero-desc{font-size:0.95rem;color:rgba(255,255,255,0.6);margin-bottom:22px;max-width:500px;line-height:1.75}
.hero-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.76);font-size:0.76rem;padding:5px 11px;border-radius:18px}
.pc{color:var(--gold-light)}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-main{background:var(--gold);color:var(--ink);padding:12px 22px;border-radius:var(--r);font-weight:700;font-size:0.88rem;text-decoration:none;border:none;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif}
.btn-main:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-wa{background:var(--WA);color:#fff;padding:12px 22px;border-radius:var(--r);font-weight:700;font-size:0.88rem;text-decoration:none;border:none;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif}
.btn-wa:hover{background:#1eb856;transform:translateY(-1px)}
/* mini stats en hero */
.hero-stats{display:flex;gap:24px;margin-top:28px;padding-top:22px;border-top:1px solid rgba(255,255,255,0.08);flex-wrap:wrap}
.sn{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--gold-light)}
.sl{font-size:0.7rem;color:rgba(255,255,255,0.38);margin-top:1px}
/* napkins en hero */
.hero-napkins{position:relative;width:220px;height:220px;flex-shrink:0}
.hn{position:absolute;border-radius:9px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,0.4)}
.hn:nth-child(1){width:150px;height:150px;top:10px;left:0;transform:rotate(-9deg);z-index:1}
.hn:nth-child(2){width:150px;height:150px;top:40px;left:40px;transform:rotate(-1deg);z-index:2}
.hn.fn{width:170px;height:170px;top:30px;left:50px;transform:rotate(6deg);z-index:3;box-shadow:0 18px 55px rgba(0,0,0,0.5)}
.hero-badge-price{position:absolute;bottom:-8px;right:-8px;background:var(--gold);color:var(--ink);padding:7px 14px;border-radius:9px;font-weight:700;font-size:0.82rem;box-shadow:0 3px 14px rgba(0,0,0,0.32);z-index:10}
@media(max-width:780px){.hero-inner{grid-template-columns:1fr}.hero-napkins{display:none}}

/* ══ TRUST BAR ══ */
.trust-bar{background:var(--cream2);border-top:1px solid var(--b);border-bottom:1px solid var(--b);padding:12px max(16px,4vw);display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:14px 28px}
.ti{display:flex;align-items:center;gap:6px;font-size:0.76rem;font-weight:500;color:var(--muted)}

/* ══ SECTION BASE ══ */
.section{padding:clamp(48px,6vw,80px) max(16px,5vw)}
.container{max-width:1160px;margin:0 auto}
.sec-label{display:inline-block;font-size:0.67rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.sec-title{margin-bottom:12px}
.sec-sub{font-size:0.95rem;color:var(--muted);max-width:560px;line-height:1.75}
.sec-hdr{margin-bottom:38px}
.sec-hdr.c{text-align:center}.sec-hdr.c .sec-sub{margin:0 auto}

/* ══════════════════════════════════════════════════════
    CONFIGURADOR + CANVAS — zona principal
══════════════════════════════════════════════════════ */
.config-section{background:var(--cream2)}
.config-grid{display:grid;grid-template-columns:1fr 400px;gap:28px;align-items:start}
@media(max-width:960px){.config-grid{grid-template-columns:1fr}}

/* Panel opciones */
.opt-panel{background:var(--white);border-radius:var(--rl);border:1px solid var(--b);overflow:hidden}
.opt-panel-head{background:var(--gd);padding:18px 22px}
.opt-panel-head h3{color:#fff;font-size:1rem;margin-bottom:3px}
.opt-panel-head p{color:rgba(255,255,255,0.42);font-size:0.76rem}
.opt-body{padding:20px 22px;display:flex;flex-direction:column;gap:18px}

.step-hd{font-size:0.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.sn2{width:18px;height:18px;border-radius:50%;background:var(--gd);color:var(--gold-light);font-size:0.62rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Medidas grid */
.med-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.med-btn{border:1px solid var(--b2);border-radius:var(--r);padding:10px 9px;cursor:pointer;background:var(--cream);transition:all .14s;text-align:left;position:relative;display:flex;flex-direction:column;gap:2px}
.med-btn:hover{border-color:var(--gold)}
.med-btn.active{border-color:var(--gm);border-width:2px;background:rgba(42,92,48,0.06)}
.med-btn-name{font-size:0.82rem;font-weight:600;color:var(--ink)}
.med-btn-open{font-size:0.7rem;color:var(--muted)}
.med-btn-tag{font-size:0.65rem;color:var(--muted);margin-top:1px}
.med-chk{position:absolute;top:6px;right:6px;width:13px;height:13px;border-radius:50%;background:var(--gm);display:none;align-items:center;justify-content:center}
.med-btn.active .med-chk{display:flex}
.med-chk::after{content:'✓';font-size:7px;color:#fff;font-weight:900}

/* Material */
.mat-list{display:flex;flex-direction:column;gap:7px}
.mat-btn{border:1px solid var(--b2);border-radius:var(--r);padding:10px 12px;cursor:pointer;background:var(--cream);transition:all .14s;display:flex;align-items:center;gap:11px}
.mat-btn:hover{border-color:var(--gold)}
.mat-btn.active{border-color:var(--gm);border-width:2px;background:rgba(42,92,48,0.06)}
.mat-sw{width:34px;height:34px;border-radius:6px;flex-shrink:0;border:1px solid var(--b2)}
.mat-info{flex:1}
.mat-name{font-size:0.84rem;font-weight:600}
.mat-desc{font-size:0.7rem;color:var(--muted)}
.mat-price{font-size:0.95rem;font-weight:700;color:var(--gm);white-space:nowrap;text-align:right}
.mat-price small{display:block;font-size:0.6rem;color:var(--muted);font-weight:400}
.dis-msg{font-size:0.76rem;color:var(--muted);font-style:italic;padding:4px 0}

/* Upload */
.upl-zone{border:2px dashed var(--b2);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:border-color .18s;background:var(--cream);position:relative}
.upl-zone:hover{border-color:var(--gold)}
.upl-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upl-ico{font-size:1.4rem;margin-bottom:4px}
.upl-txt{font-size:0.78rem;font-weight:500;color:var(--ink)}
.upl-fmt{font-size:0.66rem;color:var(--muted);margin-top:2px}

/* Contacto mini */
.contact-mini{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.contact-mini{grid-template-columns:1fr}}
.cf{display:flex;flex-direction:column;gap:4px}
.cf label{font-size:0.68rem;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.cf input{border:1px solid var(--b2);border-radius:var(--r);padding:8px 11px;font-size:0.84rem;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--cream);outline:none;transition:border-color .14s;width:100%}
.cf input:focus{border-color:var(--gm);box-shadow:0 0 0 3px rgba(42,92,48,0.1)}

/* ══ CANVAS PANEL ══ */
.canvas-panel{background:var(--white);border-radius:var(--rl);border:1px solid var(--b);overflow:hidden;position:sticky;top:72px}
.canvas-head{background:var(--ink2);padding:13px 17px;display:flex;align-items:center;justify-content:space-between}
.canvas-head-title{font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.85)}
.canvas-hint{font-size:0.66rem;color:rgba(255,255,255,0.34)}
.canvas-area{background:#ccc8c0;min-height:280px;display:flex;align-items:center;justify-content:center;position:relative;padding:16px}
.canvas-empty{text-align:center;padding:32px 20px}
.canvas-empty-ico{font-size:2.2rem;margin-bottom:8px;opacity:.35}
.canvas-empty-txt{font-size:0.78rem;color:var(--muted)}
#nc{display:none;border-radius:7px;box-shadow:0 8px 28px rgba(0,0,0,0.2);touch-action:none;cursor:grab}
#nc:active{cursor:grabbing}

/* Herramientas canvas */
.cv-tools{padding:10px 14px;border-top:1px solid var(--b);display:flex;gap:6px;flex-wrap:wrap;background:var(--cream2)}
.tool{border:1px solid var(--b2);border-radius:6px;padding:5px 10px;font-size:0.72rem;font-weight:500;cursor:pointer;background:var(--cream);color:var(--ink);transition:all .13s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px}
.tool:hover{border-color:var(--gold);background:var(--cream2)}
.tool.danger{border-color:#e57373;color:#c62828}
.tool.danger:hover{background:#ffebee}

/* ══ COTIZACIÓN VISUAL ══ */
.cot-panel{padding:16px 17px;border-top:1px solid var(--b)}
/* Tarjeta cotización */
.cot-card{background:var(--cream);border-radius:var(--r);overflow:hidden;border:1px solid var(--b)}
.cot-card-top{background:var(--gold);padding:12px 15px;display:flex;align-items:flex-start;justify-content:space-between}
.cot-card-brand{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--ink)}
.cot-card-brand small{display:block;font-family:'DM Sans',sans-serif;font-size:0.65rem;font-weight:400;color:rgba(26,20,16,0.6);margin-top:1px}
.cot-num{font-size:0.68rem;color:rgba(26,20,16,0.65);text-align:right;font-weight:500}
.cot-body{padding:12px 15px;font-size:0.78rem}
.cot-cli-row{display:flex;gap:6px;justify-content:space-between;margin-bottom:10px;font-size:0.74rem}
.cot-cli-name{font-weight:600;color:var(--ink)}
.cot-cli-meta{color:var(--muted);text-align:right}
.cot-table{width:100%;border-collapse:collapse;margin-bottom:10px}
.cot-table th{background:var(--gd);color:rgba(255,255,255,0.82);padding:6px 8px;text-align:left;font-size:0.65rem;font-weight:500;letter-spacing:.04em}
.cot-table td{padding:6px 8px;border-bottom:1px solid var(--b);font-size:0.74rem;color:var(--ink)}
.cot-table tr:last-child td{border-bottom:none}
.cot-table tr:nth-child(even) td{background:var(--cream2)}
.cot-totals{display:flex;flex-direction:column;gap:3px;align-items:flex-end;padding-top:8px;border-top:1px solid var(--b)}
.cot-total-row{display:flex;gap:18px;font-size:0.72rem;color:var(--muted)}
.cot-total-grand{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--gm);margin-top:3px}
.cot-footer-note{font-size:0.62rem;color:var(--muted);margin-top:9px;padding-top:8px;border-top:1px dashed var(--b2);line-height:1.5}

/* Precio grande + CTA */
.price-cta-wrap{padding:14px 17px;background:var(--gd);display:flex;flex-direction:column;gap:10px}
.price-display{display:flex;align-items:baseline;gap:8px}
.price-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold-light);line-height:1}
.price-sub{font-size:0.72rem;color:rgba(255,255,255,0.42);line-height:1.5}
.cta-btns{display:flex;flex-direction:column;gap:8px}
.btn-wa-main{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--WA);color:#fff;border:none;border-radius:var(--r);padding:12px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all .18s}
.btn-wa-main:hover{background:#1eb856;transform:translateY(-1px)}
.btn-wa-main:disabled{background:#888;cursor:not-allowed;transform:none}
.btn-preview{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75);border:1px solid rgba(255,255,255,0.18);border-radius:var(--r);padding:8px;font-family:'DM Sans',sans-serif;font-size:0.76rem;font-weight:500;cursor:pointer;transition:all .18s}
.btn-preview:hover{background:rgba(255,255,255,0.16)}
.btn-note{font-size:0.65rem;color:rgba(255,255,255,0.3);text-align:center}

/* ══ STICKY MOBILE BAR ══ */
.sticky-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--gd);padding:12px 16px;border-top:1px solid rgba(255,255,255,0.1);flex-direction:column;gap:6px;box-shadow:0 -4px 20px rgba(0,0,0,0.3)}
@media(max-width:960px){.sticky-bar{display:flex}}
.sb-price{display:flex;align-items:baseline;gap:8px}
.sb-price-num{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--gold-light)}
.sb-price-sub{font-size:0.7rem;color:rgba(255,255,255,0.42)}
.sb-btn{background:var(--WA);color:#fff;border:none;border-radius:var(--r);padding:11px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;transition:all .18s}
.sb-btn:hover{background:#1eb856}

/* ══ PRODUCTOS CARDS (scroll horizontal en mobile) ══ */
.products-section{background:var(--white)}
.products-scroll{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.prod-card{background:var(--cream);border:1px solid var(--b);border-radius:var(--rl);overflow:hidden;transition:all .22s;cursor:pointer}
.prod-card:hover{transform:translateY(-3px);box-shadow:var(--sh);border-color:var(--b2)}
.prod-card.feat{border-color:var(--gold);border-width:2px}
.prod-badge{position:absolute;top:10px;left:10px;background:var(--gold);color:var(--ink);font-size:0.64rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.prod-img{position:relative;height:175px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.prod-body{padding:15px}
.prod-name{font-size:0.95rem;font-weight:600;margin-bottom:3px}
.prod-dims{font-size:0.75rem;color:var(--muted);margin-bottom:8px;display:flex;gap:5px;flex-wrap:wrap}
.dtag{background:var(--cream2);border:1px solid var(--b);padding:2px 7px;border-radius:4px;font-size:0.68rem}
.prod-attrs{margin-bottom:10px}
.arow{display:flex;align-items:center;gap:5px;font-size:0.76rem;color:var(--muted);margin-bottom:2px}
.adot{width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0}
.prod-price-row{padding-top:10px;border-top:1px solid var(--b)}
.pcl{font-size:0.65rem;color:var(--muted);margin-bottom:1px}
.pcb{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:700;color:var(--gm);line-height:1}
.pln{font-size:0.65rem;color:var(--gold);font-weight:600;margin-top:2px}

/* ══ STEPS / PROCESO ══ */
.how-section{background:var(--white)}
.steps-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:0;position:relative}
.steps-row::before{content:'';position:absolute;top:33px;left:10%;right:10%;height:1px;background:var(--b2);z-index:0}
.step-card{text-align:center;padding:0 16px;position:relative;z-index:1}
.step-circ{width:66px;height:66px;border-radius:50%;background:var(--cream);border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--gm)}
.step-circ.ac{background:var(--gd);border-color:var(--gm);color:var(--gold-light)}
.step-title{font-size:0.86rem;font-weight:600;margin-bottom:5px}
.step-desc{font-size:0.74rem;color:var(--muted);line-height:1.6}
@media(max-width:640px){.steps-row::before{display:none}.steps-row{gap:24px}}

/* ══ USOS ══ */
.usos-section{background:var(--cream2)}
.usos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.uso-card{background:var(--white);border:1px solid var(--b);border-radius:var(--r);padding:15px 12px;text-align:center;transition:all .18s}
.uso-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--sh)}
.uso-emoji{font-size:1.6rem;margin-bottom:6px;display:block}
.uso-name{font-size:0.8rem;font-weight:600;color:var(--ink);margin-bottom:2px}
.uso-desc{font-size:0.68rem;color:var(--muted)}

/* ══ SPECS TABLE ══ */
.specs-section{background:var(--white)}
.specs-wrap{border-radius:var(--r);overflow:hidden;border:1px solid var(--b);overflow-x:auto}
.specs-table{width:100%;border-collapse:collapse;font-size:0.82rem;min-width:540px}
.specs-table th{background:var(--gd);color:rgba(255,255,255,0.8);padding:10px 13px;text-align:left;font-weight:500;font-size:0.72rem;letter-spacing:.04em}
.specs-table td{padding:10px 13px;border-bottom:1px solid var(--b);color:var(--ink)}
.specs-table tr:last-child td{border-bottom:none}
.specs-table tr:nth-child(even) td{background:var(--cream)}
.specs-table tr:hover td{background:rgba(42,92,48,0.04)}
.pg{color:var(--gm);font-weight:700}

/* ══ PROCESO IMPRESION ══ */
.proc-section{background:var(--cream2)}
.proc-cols{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
@media(max-width:800px){.proc-cols{grid-template-columns:1fr}}
.proc-list{display:flex;flex-direction:column;gap:15px;margin-top:22px}
.proc-item{display:flex;gap:12px}
.proc-ico{width:38px;height:38px;border-radius:8px;background:var(--gd);color:var(--gold-light);display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0}
.proc-title{font-size:0.86rem;font-weight:600;margin-bottom:2px}
.proc-desc{font-size:0.76rem;color:var(--muted);line-height:1.6}
.color-card{background:var(--white);border:1px solid var(--b);border-radius:var(--rl);padding:22px}
.color-grid{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:12px 0}
.cdot{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.3)}
.fmt-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.fpill{background:var(--cream);border:1px solid var(--b2);border-radius:6px;padding:4px 9px;font-size:0.72rem;font-weight:600}

/* ══ TESTIMONIOS ══ */
.test-section{background:var(--gd);padding:clamp(48px,6vw,80px) max(16px,5vw)}
.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:13px;margin-top:30px}
.test-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:var(--rl);padding:17px}
.test-stars{color:var(--gold-light);font-size:0.78rem;margin-bottom:9px;letter-spacing:2px}
.test-text{font-size:0.8rem;color:rgba(255,255,255,0.7);line-height:1.7;margin-bottom:12px;font-style:italic}
.test-author{display:flex;align-items:center;gap:9px}
.test-av{width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:var(--ink);flex-shrink:0}
.test-name{font-size:0.76rem;font-weight:600;color:rgba(255,255,255,0.88)}
.test-biz{font-size:0.66rem;color:rgba(255,255,255,0.36)}

/* ══ FAQ ══ */
.faq-section{background:var(--cream)}
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:680px){.faq-grid{grid-template-columns:1fr}}
.faq-item{background:var(--white);border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.faq-q{padding:14px 16px;font-size:0.82rem;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;transition:background .13s;gap:10px}
.faq-q:hover{background:var(--cream)}
.faq-ico{font-size:1rem;color:var(--gold);flex-shrink:0;transition:transform .18s}
.faq-a{display:none;padding:0 16px 14px;font-size:0.78rem;color:var(--muted);line-height:1.7;border-top:1px solid var(--b);padding-top:10px}
.faq-item.open .faq-a{display:block}
.faq-item.open .faq-ico{transform:rotate(45deg)}

/* ══ CTA FINAL ══ */
.cta-section{background:var(--gd);padding:clamp(64px,9vw,110px) max(16px,5vw);text-align:center;position:relative;overflow:hidden}
.cta-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 50%,rgba(184,132,42,0.1) 0%,transparent 70%)}
.cta-section h2{color:#fff;margin-bottom:12px;position:relative}
.cta-section p{color:rgba(255,255,255,0.48);margin-bottom:26px;font-size:0.94rem;position:relative}
.cta-btns-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;position:relative}

/* ══ FOOTER ══ */
footer{background:var(--ink2);color:rgba(255,255,255,0.42);padding:28px max(16px,5vw);display:flex;flex-wrap:wrap;gap:13px;justify-content:space-between;align-items:center}
.footer-brand{font-family:'Playfair Display',serif;color:var(--gold-light);font-size:0.95rem;display:flex;align-items:center;gap:7px}
.footer-links{display:flex;gap:14px;flex-wrap:wrap}
.footer-links a{color:rgba(255,255,255,0.34);text-decoration:none;font-size:0.74rem;transition:color .18s}
.footer-links a:hover{color:var(--gold-light)}
.footer-copy{font-size:0.67rem;width:100%;text-align:center;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06);margin-top:4px}

/* ══ FLOATING WA ══ */
.wa-float{position:fixed;bottom:clamp(72px,12vw,90px);right:18px;z-index:199;width:52px;height:52px;background:var(--WA);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(37,211,102,0.4);transition:all .18s;text-decoration:none}
.wa-float:hover{transform:scale(1.08)}
.wa-float svg{width:26px;height:26px;fill:#fff}
@media(max-width:960px){.wa-float{bottom:90px}}

/* ══ UTILIDADES ══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .5s ease both}

/* ══════════════════════════════════
   MOBILE OVERRIDES — max 480px
══════════════════════════════════ */
@media(max-width:480px){

  /* NAV — tabs más cortos */
  .site-tabs{padding:3px}
  .site-tab{padding:4px 8px;font-size:0.68rem}

  /* HERO — más compacto */
  .hero{padding:28px 16px 24px}
  .hero h1{font-size:1.75rem}
  .hero-desc{font-size:0.86rem;margin-bottom:16px}
  .hero-pills{gap:5px}
  .pill{font-size:0.7rem;padding:4px 9px}
  .hero-btns{gap:8px}
  .btn-main,.btn-wa{padding:10px 16px;font-size:0.82rem}
  .hero-stats{gap:16px;margin-top:20px;padding-top:16px}
  .sn{font-size:1.25rem}
  .sl{font-size:0.65rem}

  /* TRUST BAR */
  .trust-bar{gap:10px 18px;padding:10px 14px}
  .ti{font-size:0.7rem}

  /* SECCIONES — padding más chico */
  .section{padding:36px 14px}

  /* SEC HEADERS */
  .sec-hdr{margin-bottom:24px}
  h2{font-size:1.3rem}
  .sec-sub{font-size:0.86rem}

  /* CONFIGURADOR — panel opciones */
  .opt-panel-head{padding:14px 16px}
  .opt-body{padding:14px 16px;gap:14px}
  .step-hd{font-size:0.65rem;margin-bottom:7px}

  /* Medidas — 2 cols pero más chicas */
  .med-grid{gap:6px}
  .med-btn{padding:8px 8px}
  .med-btn-name{font-size:0.78rem}
  .med-btn-open{font-size:0.65rem}
  .med-btn-tag{font-size:0.6rem}

  /* Material — precio en columna */
  .mat-btn{padding:9px 10px;gap:8px}
  .mat-sw{width:28px;height:28px}
  .mat-name{font-size:0.8rem}
  .mat-desc{font-size:0.66rem}
  .mat-price{font-size:0.82rem}
  .mat-price small{font-size:0.58rem}

  /* Upload zone */
  .upl-zone{padding:12px}
  .upl-ico{font-size:1.2rem}
  .upl-txt{font-size:0.74rem}
  .upl-fmt{font-size:0.62rem}

  /* Canvas */
  .canvas-head{padding:10px 14px}
  .canvas-area{padding:12px;min-height:220px}
  .cv-tools{padding:8px 10px;gap:4px}
  .tool{padding:4px 8px;font-size:0.68rem}

  /* Cotización visual */
  .cot-panel{padding:12px 14px}
  .cot-card-brand{font-size:0.88rem}
  .cot-total-grand{font-size:1.2rem}

  /* Zona acción */
  .price-cta-wrap{padding:12px 14px;gap:8px}
  .price-num{font-size:1.7rem}
  .btn-wa-main{padding:11px;font-size:0.82rem}
  .btn-note{font-size:0.62rem}

  /* Sticky bar */
  .sticky-bar{padding:9px 14px;gap:5px}
  .sb-price-num{font-size:1.2rem}
  .sb-btn{padding:10px;font-size:0.82rem}

  /* PRODUCTOS — 1 columna en móvil */
  .products-scroll{grid-template-columns:1fr}
  .prod-img{height:150px}
  .prod-body{padding:12px}
  .prod-name{font-size:0.9rem}
  .pcb{font-size:1.35rem}

  /* SPECS TABLE — hint de scroll */
  .specs-wrap{position:relative}
  .specs-wrap::after{
    content:'← desliza →';
    display:block;
    text-align:center;
    font-size:0.65rem;
    color:var(--muted);
    padding:5px 0 2px;
  }
  .specs-table{font-size:0.74rem}
  .specs-table th,.specs-table td{padding:7px 9px}

  /* STEPS */
  .steps-row{grid-template-columns:1fr 1fr;gap:20px}
  .step-circ{width:52px;height:52px;font-size:1rem}
  .step-title{font-size:0.8rem}
  .step-desc{font-size:0.7rem}

  /* USOS */
  .usos-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .uso-card{padding:12px 10px}
  .uso-emoji{font-size:1.35rem}
  .uso-name{font-size:0.76rem}
  .uso-desc{font-size:0.64rem}

  /* PROCESO */
  .proc-list{gap:12px}
  .proc-item{gap:10px}
  .proc-ico{width:34px;height:34px;font-size:0.82rem}
}
</style>
</head>
